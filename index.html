<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sentinela Energia Solar | Simulador</title>

<style>
:root{
  --primary:#0F5C1F;
  --primary-light:#1F7A32;
  --accent:#F97316;
  --bg:#f2f7f3;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#f2f7f3,#e6f3ea);
  padding:35px;
  color:var(--text);
}

.container{
  max-width:1000px;
  margin:auto;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--card);
  padding:25px 30px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.06);
  margin-bottom:30px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  width:85px;
}

.title{
  font-size:26px;
  font-weight:700;
  color:var(--primary);
}

.subtitle{
  font-size:14px;
  color:var(--muted);
}

.date{
  font-size:13px;
  color:var(--muted);
}

.card{
  background:var(--card);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 35px rgba(0,0,0,0.05);
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:14px;
  transition:0.3s;
}

input:focus,select:focus{
  border-color:var(--primary-light);
  box-shadow:0 0 0 3px rgba(31,122,50,0.15);
  outline:none;
}

button{
  padding:14px 24px;
  border-radius:14px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-primary:hover{
  background:#0b4517;
  transform:translateY(-2px);
}

.btn-secondary{
  background:var(--accent);
  color:white;
  font-size:13px;
  padding:8px 14px;
  margin-top:8px;
}

.results{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.result-box{
  background:#f9fafb;
  padding:20px;
  border-radius:16px;
  border:1px solid #e5e7eb;
  text-align:center;
  transition:0.3s;
}

.result-box:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.highlight{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:white;
  border:none;
}

.highlight .result-value{
  color:white;
  font-size:24px;
}

.result-title{
  font-size:13px;
  font-weight:600;
}

.result-value{
  margin-top:8px;
  font-size:18px;
  font-weight:700;
  color:var(--primary);
}

.hidden{display:none}

/* IMPRESSÃO A4 */
@media print{
  body{
    background:white;
    padding:0;
  }

  button{
    display:none;
  }

  .card, .header{
    box-shadow:none;
  }

  @page{
    size:A4;
    margin:15mm;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="header-left">
      <img src="https://i.postimg.cc/hv2yrnxZ/Captura_de_tela_2026_01_12_162937.png" class="logo">
      <div>
        <div class="title">Sentinela Energia Solar</div>
        <div class="subtitle">Simulador de Economia com Créditos de Energia</div>
      </div>
    </div>
    <div class="date">
      <span id="dataAtual"></span>
    </div>
  </div>

  <div class="card">
    <div class="grid">

      <div>
        <label>Consumo Final (kWh)</label>
        <input id="consumo" type="number" value="500">
      </div>

      <div>
        <label>Tarifa Sentinela (R$)</label>
        <input id="valorInjetada" type="number" value="0.88">
      </div>

      <div>
        <label>Tarifa Energisa (R$)</label>
        <input id="valorEnergisa" type="number" value="1.15401">
      </div>

      <div>
        <label>Outros Serviços</label>
        <div id="servicesList">
          <input class="service" type="number" value="0">
        </div>
        <button type="button" class="btn-secondary" onclick="addService()">Adicionar</button>
      </div>

      <div>
        <label>Possui economia acumulada?</label>
        <select id="temAcumulado">
          <option value="nao">Não</option>
          <option value="sim">Sim</option>
        </select>
      </div>

      <div id="acumuladoGroup" class="hidden">
        <label>Economia acumulada (R$)</label>
        <input id="economiaAcumulada" type="number" value="0">
      </div>

    </div>

    <button onclick="calcular()" class="btn-primary" style="margin-top:25px;">
      Calcular Simulação
    </button>
  </div>

  <div class="card">
    <div class="results">

      <div class="result-box highlight">
        <div class="result-title">Economia Mensal</div>
        <div class="result-value" id="economia">R$ 0,00</div>
      </div>

      <div class="result-box">
        <div class="result-title">Com Sentinela</div>
        <div class="result-value" id="valorCom">R$ 0,00</div>
      </div>

      <div class="result-box">
        <div class="result-title">Sem Sentinela</div>
        <div class="result-value" id="valorSem">R$ 0,00</div>
      </div>

      <div class="result-box">
        <div class="result-title">Economia %</div>
        <div class="result-value" id="porcentagem">0%</div>
      </div>

      <div class="result-box hidden" id="boxAcumulada">
        <div class="result-title">Economia Acumulada</div>
        <div class="result-value" id="economiaAcumuladaFinal">R$ 0,00</div>
      </div>

      <div class="result-box">
        <div class="result-title">Economia em 12 Meses</div>
        <div class="result-value" id="economia12">R$ 0,00</div>
      </div>

    </div>
  </div>

</div>

<script>
document.getElementById("dataAtual").textContent =
new Date().toLocaleDateString("pt-BR");

const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const el = id => document.getElementById(id);

document.getElementById("temAcumulado").addEventListener("change",()=>{
  el("acumuladoGroup").classList.toggle("hidden", el("temAcumulado").value!=="sim");
});

function addService(){
  const input=document.createElement("input");
  input.type="number";
  input.value="0";
  input.className="service";
  input.style.marginTop="8px";
  el("servicesList").appendChild(input);
}

function calcular(){
  let consumo=parseFloat(el("consumo").value)||0;
  let valInj=parseFloat(el("valorInjetada").value)||0;
  let valEne=parseFloat(el("valorEnergisa").value)||0;

  let servicos=[...document.querySelectorAll(".service")]
    .reduce((acc,i)=>acc+(parseFloat(i.value)||0),0);

  let com=consumo*valInj+servicos;
  let sem=consumo*valEne+servicos;
  let economia=sem-com;
  let porcentagem=sem>0?(economia/sem)*100:0;

  el("valorCom").textContent=fmt(com);
  el("valorSem").textContent=fmt(sem);
  el("economia").textContent=fmt(economia);
  el("porcentagem").textContent=porcentagem.toFixed(2)+"%";
  el("economia12").textContent=fmt(economia*12);

  if(el("temAcumulado").value==="sim"){
    let acum=parseFloat(el("economiaAcumulada").value)||0;
    el("economiaAcumuladaFinal").textContent=fmt(acum+economia);
    el("boxAcumulada").classList.remove("hidden");
  }else{
    el("boxAcumulada").classList.add("hidden");
  }
}
</script>

</body>
</html>
